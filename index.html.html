<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First₹ AI</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:white;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#111;
}

.hero {
  text-align:center;
  padding:100px 20px;
}

section {
  padding:60px 20px;
  max-width:900px;
  margin:auto;
}

.demo {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.chat {
  flex:1;
  background:#111;
  padding:15px;
  border-radius:10px;
}

.msg {
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
}

.ai { background:#1D9E75; }
.user { background:#333; text-align:right; }

.gigs {
  flex:1;
}

.gig {
  background:#111;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

/* MODALS */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
}

.modal {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
  width:320px;
  display:none;
}

/* CHECKLIST */
.check-item { margin-bottom:8px; }

.progress-bar {
  height:6px;
  background:#333;
  border-radius:10px;
  margin-top:10px;
}

.progress-fill {
  height:100%;
  width:0%;
  background:#1D9E75;
  border-radius:10px;
}

/* BUTTON */
button {
  margin-top:15px;
  width:100%;
  padding:10px;
  border:none;
}

/* SUCCESS MODAL */
.success {
  text-align:center;
}
.success h2 {
  color:#1D9E75;
}
</style>
</head>

<body>

<nav>
  <div>First₹ AI</div>
</nav>

<div class="hero">
  <h1>Earn Your First ₹500</h1>
</div>

<section>
  <h2>Live Demo</h2>

  <div class="demo">

    <div class="chat">
      <div class="msg user">I want ₹500</div>
      <div class="msg ai">Here are gigs 👇</div>
    </div>

    <div class="gigs">
      <div class="gig" onclick="openModal()">PPT Task — ₹180</div>
    </div>

  </div>
</section>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- TASK MODAL -->
<div class="modal" id="taskModal">
  <h3>PPT Task Checklist</h3>

  <div id="checklist">
    <div class="check-item"><input type="checkbox" onchange="updateProgress()"> 10 slides minimum</div>
    <div class="check-item"><input type="checkbox" onchange="updateProgress()"> Proper headings</div>
    <div class="check-item"><input type="checkbox" onchange="updateProgress()"> Clean design</div>
    <div class="check-item"><input type="checkbox" onchange="updateProgress()"> Submit ppt file</div>
  </div>

  <div id="progressText">0/4 completed</div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <button id="submitBtn" onclick="submitTask()" disabled>Complete all tasks</button>
</div>

<!-- SUCCESS MODAL -->
<div class="modal success" id="successModal">
  <h2>🎉 Payment Released</h2>
  <p>You earned ₹180</p>
  <button onclick="closeAll()">Continue</button>
</div>

<script>
function openModal() {
  document.getElementById("overlay").style.display = "block";
  document.getElementById("taskModal").style.display = "block";
}

function closeAll() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("taskModal").style.display = "none";
  document.getElementById("successModal").style.display = "none";
}

function updateProgress() {
  const checks = document.querySelectorAll("#checklist input");
  let done = 0;

  checks.forEach(c => { if (c.checked) done++; });

  const total = checks.length;
  const percent = (done / total) * 100;

  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("progressText").innerText = done + "/" + total + " completed";

  const btn = document.getElementById("submitBtn");

  if (done === total) {
    btn.disabled = false;
    btn.style.background = "#1D9E75";
    btn.style.color = "white";
    btn.innerText = "Submit Task";
  } else {
    btn.disabled = true;
    btn.style.background = "#333";
    btn.style.color = "#aaa";
    btn.innerText = "Complete all tasks";
  }
}

function submitTask() {
  const btn = document.getElementById("submitBtn");
  btn.innerText = "AI Validating...";
  btn.style.background = "#085041";

  setTimeout(() => {
    document.getElementById("taskModal").style.display = "none";
    document.getElementById("successModal").style.display = "block";
  }, 1500);
}
</script>

</body>
</html>
