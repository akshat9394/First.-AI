<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First₹ AI — Earn Your First Income</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #085041;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --gray-100: #F1EFE8;
    --gray-200: #D3D1C7;
    --gray-500: #888780;
    --gray-900: #2C2C2A;
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #181818;
    --border: rgba(255,255,255,0.08);
    --text: #f0efea;
    --text-muted: #888780;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
 
  h1, h2, h3, h4, .brand { font-family: 'Syne', sans-serif; }
 
  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .brand span { color: var(--green); }
  .nav-links { display: flex; gap: 2rem; align-items: center; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }
  .nav-cta {
    background: var(--green);
    color: white !important;
    padding: 0.5rem 1.2rem;
    border-radius: 8px;
    font-weight: 500;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--green-dark) !important; color: white !important; }
 
  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center;
    padding: 8rem 2rem 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(29,158,117,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(83,74,183,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(29,158,117,0.12);
    border: 1px solid rgba(29,158,117,0.3);
    color: #5DCAA5;
    padding: 0.4rem 1rem;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
    letter-spacing: 0.3px;
  }
  .hero-badge::before { content: "●"; font-size: 8px; }
  .hero h1 {
    font-size: clamp(2.8rem, 6vw, 5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    margin-bottom: 1.5rem;
    max-width: 800px;
  }
  .hero h1 .accent { color: var(--green); }
  .hero p {
    font-size: 1.15rem;
    color: var(--text-muted);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }
  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .btn-primary {
    background: var(--green);
    color: white;
    padding: 0.9rem 2rem;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    border: none; cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    display: inline-block;
  }
  .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    padding: 0.9rem 2rem;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    border: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, transform 0.15s;
    display: inline-block;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
 
  .hero-stats {
    margin-top: 5rem;
    display: flex; gap: 3rem; flex-wrap: wrap; justify-content: center;
  }
  .stat { text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--text); }
  .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }
 
  /* SECTION BASE */
  section { padding: 5rem 2rem; }
  .container { max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 0.8rem;
  }
  .section-title {
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.15;
    margin-bottom: 1rem;
  }
  .section-sub {
    font-size: 1rem;
    color: var(--text-muted);
    max-width: 480px;
    line-height: 1.7;
    font-weight: 300;
  }
 
  /* HOW IT WORKS */
  .how { background: var(--bg2); }
  .steps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0;
    margin-top: 3rem;
    position: relative;
  }
  .step {
    padding: 2rem;
    border: 1px solid var(--border);
    position: relative;
    transition: background 0.2s;
  }
  .step:hover { background: rgba(255,255,255,0.02); }
  .step-num {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 1px;
    margin-bottom: 1rem;
  }
  .step-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    margin-bottom: 1rem;
  }
  .step h4 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
  .step p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; font-weight: 300; }
 
  /* FEATURES */
  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1px;
    margin-top: 3rem;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .feature {
    background: var(--bg);
    padding: 2rem;
    transition: background 0.2s;
  }
  .feature:hover { background: var(--bg2); }
  .feature-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    margin-bottom: 1.2rem;
  }
  .feature h4 { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.6rem; }
  .feature p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.65; font-weight: 300; }
 
  /* DEMO SECTION */
  .demo { background: var(--bg2); }
  .demo-flow {
    margin-top: 3rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }
  .demo-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .demo-card-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.85rem; font-weight: 500;
  }
  .demo-card-body { padding: 1.5rem; }
  .ai-chat { display: flex; flex-direction: column; gap: 1rem; }
  .msg {
    padding: 0.8rem 1rem;
    border-radius: 10px;
    font-size: 0.85rem;
    line-height: 1.5;
    max-width: 90%;
  }
  .msg-ai {
    background: rgba(29,158,117,0.12);
    border: 1px solid rgba(29,158,117,0.2);
    color: #9FE1CB;
    align-self: flex-start;
  }
  .msg-user {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    align-self: flex-end;
  }
  .gig-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .gig-card:hover { border-color: rgba(29,158,117,0.4); }
  .gig-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.8rem; }
  .gig-title { font-size: 0.9rem; font-weight: 500; }
  .gig-price {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--green);
    white-space: nowrap;
  }
  .gig-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
  .tag {
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    font-size: 0.7rem;
    font-weight: 500;
  }
  .tag-skill { background: var(--purple-light); color: var(--purple); }
  .tag-beginner { background: var(--green-light); color: var(--green-dark); }
  .tag-time { background: var(--amber-light); color: var(--amber); }
  .gig-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 1rem; }
 
  /* TIERS */
  .tiers-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 3rem;
  }
  .tier-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    position: relative;
    transition: transform 0.2s;
  }
  .tier-card:hover { transform: translateY(-3px); }
  .tier-card.featured { border-color: rgba(29,158,117,0.5); background: rgba(29,158,117,0.05); }
  .tier-badge {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: var(--green);
    color: white;
    padding: 0.25rem 0.8rem;
    border-radius: 100px;
    font-size: 0.7rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .tier-emoji { font-size: 2rem; margin-bottom: 1rem; }
  .tier-name { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
  .tier-range { font-size: 0.8rem; color: var(--green); font-weight: 500; margin-bottom: 1rem; }
  .tier-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.6; font-weight: 300; }
  .tier-items { list-style: none; margin-top: 1.2rem; text-align: left; }
  .tier-items li { font-size: 0.8rem; color: var(--text-muted); padding: 0.3rem 0; display: flex; align-items: center; gap: 0.5rem; }
  .tier-items li::before { content: "✓"; color: var(--green); font-weight: 700; flex-shrink: 0; }
 
  /* ESCROW FLOW */
  .escrow-flow {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 3rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .flow-step {
    flex: 1;
    padding: 2rem 1.5rem;
    text-align: center;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .flow-step:last-child { border-right: none; }
  .flow-step-icon { font-size: 2rem; margin-bottom: 0.8rem; }
  .flow-step h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.4rem; }
  .flow-step p { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; font-weight: 300; }
  .flow-arrow {
    position: absolute; right: -1px; top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    color: var(--text-muted);
  }
 
  /* CTA */
  .cta-section {
    background: linear-gradient(135deg, rgba(29,158,117,0.15) 0%, rgba(83,74,183,0.1) 100%);
    border-top: 1px solid var(--border);
    text-align: center;
    padding: 6rem 2rem;
  }
  .cta-section h2 { font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 800; letter-spacing: -1.5px; margin-bottom: 1rem; }
  .cta-section p { color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1rem; font-weight: 300; }
  .cta-input-row {
    display: flex; gap: 0.8rem;
    max-width: 440px; margin: 0 auto;
    flex-wrap: wrap; justify-content: center;
  }
  .cta-input {
    flex: 1;
    min-width: 200px;
    padding: 0.9rem 1.2rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .cta-input:focus { border-color: rgba(29,158,117,0.5); }
  .cta-input::placeholder { color: var(--text-muted); }
 
  /* FOOTER */
  footer {
    padding: 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  footer p { font-size: 0.8rem; color: var(--text-muted); }
  .footer-links { display: flex; gap: 1.5rem; }
  .footer-links a { font-size: 0.8rem; color: var(--text-muted); text-decoration: none; }
  .footer-links a:hover { color: var(--text); }
 
  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero > * { animation: fadeUp 0.6s ease both; }
  .hero-badge { animation-delay: 0s; }
  .hero h1 { animation-delay: 0.1s; }
  .hero p { animation-delay: 0.2s; }
  .hero-btns { animation-delay: 0.3s; }
  .hero-stats { animation-delay: 0.4s; }
 
  /* PROGRESS BAR */
  .progress-track {
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    height: 6px;
    margin-top: 0.5rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--green);
    transition: width 1s ease;
  }
 
  @media (max-width: 768px) {
    .demo-flow { grid-template-columns: 1fr; }
    .tiers-grid { grid-template-columns: 1fr; }
    .escrow-flow { flex-direction: column; }
    .flow-step { border-right: none; border-bottom: 1px solid var(--border); }
    .flow-step:last-child { border-bottom: none; }
    nav { padding: 1rem; }
    .nav-links { gap: 1rem; }
    .nav-links a:not(.nav-cta) { display: none; }
  }
</style>
</head>
<body>
