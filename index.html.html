<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First₹ AI</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:white;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#111;
}
nav a {
  color:#aaa;
  margin-left:20px;
  text-decoration:none;
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px;
}
.hero h1 {
  font-size:40px;
}
.btn {
  background:#1D9E75;
  padding:10px 20px;
  border:none;
  color:white;
  cursor:pointer;
  margin-top:15px;
}

/* SECTION */
section {
  padding:60px 20px;
  max-width:900px;
  margin:auto;
}

/* DEMO */
.demo {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

/* CHAT */
.chat {
  flex:1;
  background:#111;
  padding:15px;
  border-radius:10px;
}
.msg {
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
}
.ai { background:#1D9E75; }
.user { background:#333; text-align:right; }

/* GIG CARDS */
.gigs {
  flex:1;
}
.gig {
  background:#111;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}
.gig:hover {
  border:1px solid #1D9E75;
}

/* MODAL */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
}

.modal {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
  display:none;
}

.modal h3 {
  margin-top:0;
}

.close {
  cursor:pointer;
  float:right;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>First₹ AI</div>
  <div>
    <a href="#">How</a>
    <a href="#">Features</a>
    <a href="#">Demo</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Earn Your First ₹500</h1>
  <p>AI-guided micro gigs for beginners</p>
  <button class="btn">Start</button>
</div>

<!-- DEMO -->
<section>
  <h2>Live Demo</h2>

  <div class="demo">

    <div class="chat">
      <div class="msg user">I want ₹500</div>
      <div class="msg ai">Here are gigs for you 👇</div>
    </div>

    <div class="gigs">
      <div class="gig" onclick="openModal('PPT Task')">PPT Task — ₹180</div>
      <div class="gig" onclick="openModal('Essay Edit')">Essay Edit — ₹120</div>
      <div class="gig" onclick="openModal('Notes')">Notes — ₹200</div>
    </div>

  </div>
</section>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal()"></div>

<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h3 id="modalTitle">Task</h3>
  <p>Basic task details here</p>
</div>

<script>
function openModal(title) {
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modal").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
